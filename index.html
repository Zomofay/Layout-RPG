<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Seleção de Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Selecione o seu personagem</h1>
    </header>

    <main>
        <section class="perfis" aria-label="Seleção de perfis de usuário">
            <article class="perfil" role="button" tabindex="0" aria-label="Selecionar perfil Berserker">
                <img src="/assets/Berserker com olhos flamejantes e machado.png" alt="Berserker - Guerreiro com olhos flamejantes">
                <h2>Berserker</h2>
            </article>

            <article class="perfil" role="button" tabindex="0" aria-label="Selecionar perfil Necromante">
                <img src="/assets/necromante poderoso.png" alt="Necromante - Feiticeiro poderoso">
                <h2>Necromante</h2>
            </article>

            <article class="perfil" role="button" tabindex="0" aria-label="Selecionar perfil Arco Celeste">
                <img src="/assets/A arqueira radiante da justiça.png" alt="Arco Celeste - Arqueira radiante da justiça">
                <h2>Arco Celeste</h2>
            </article>

            <article class="perfil" role="button" tabindex="0" aria-label="Selecionar perfil Elemental">
                <img src="/assets/Feiticeira elemental em poder mágico.png" alt="Elemental - Feiticeira elemental em poder mágico">
                <h2>Elemental</h2>
            </article>

            <article class="perfil" role="button" tabindex="0" aria-label="Selecionar perfil Magia Afiada">
                <img src="/assets/Feiticeira sombria e magia verde.png" alt="Magia Afiada - Feiticeira sombria com magia verde">
                <h2>Magia Afiada</h2>
            </article>

            <article class="perfil" role="button" tabindex="0" aria-label="Selecionar perfil Cestus">
                <img src="/assets/Guerreiro em chamas e fúria.png" alt="Cestus - Guerreiro em chamas e fúria">
                <h2>Cestus</h2>
            </article>
        </section>
    </main>

    <script src="perfis.js"></script>
</body>
</html>
